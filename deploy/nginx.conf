# nginx.conf — reverse proxy for couchlist.org.
#
# WHY NGINX AT ALL:
# The Node server listens on port 3000. Nginx listens on 80 (HTTP) and,
# once certbot runs, 443 (HTTPS). Every request hits nginx first, which
# forwards it to Node. This buys us:
#   - HTTPS termination (certbot slots the cert into this file)
#   - Easy multi-site hosting later (one nginx, many domains)
#   - A standard, well-documented front door — the universal pattern
#
# Install (run on droplet after DNS is pointed):
#   apt install -y nginx
#   cp /root/projects/couchlist/deploy/nginx.conf /etc/nginx/sites-available/couchlist.org
#   ln -s /etc/nginx/sites-available/couchlist.org /etc/nginx/sites-enabled/
#   rm -f /etc/nginx/sites-enabled/default       # drop the nginx welcome page
#   nginx -t                                       # verify syntax
#   systemctl reload nginx
#
# Then, once couchlist.org resolves to the droplet:
#   apt install -y certbot python3-certbot-nginx
#   certbot --nginx -d couchlist.org -d www.couchlist.org
# Certbot edits THIS FILE IN PLACE — it adds a second `server {}` block
# for port 443 with SSL, and rewrites the port-80 block to redirect to
# HTTPS. After that, renewals run automatically via a systemd timer.

server {
    listen 80;
    listen [::]:80;                                  # listen on IPv6 too
    server_name couchlist.org www.couchlist.org;

    # Forward every request to the Node server on localhost.
    location / {
        proxy_pass http://127.0.0.1:3000;            # where the Node app listens
        proxy_http_version 1.1;
        proxy_set_header Host $host;                 # pass original hostname through
        proxy_set_header X-Real-IP $remote_addr;     # so server.js sees the visitor's IP, not nginx's
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;  # "http" or "https" — app needs this once HTTPS is on
    }
}
